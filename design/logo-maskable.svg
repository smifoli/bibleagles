<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="280" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0f13"/>
    </linearGradient>
    <linearGradient id="eagle" x1="20" y1="60" x2="180" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Full-bleed background (no rounded corners): OS applies its own mask shape -->
  <rect width="280" height="280" fill="url(#bg)"/>

  <!-- Eagle artwork centered with a 40px safe-zone margin on every side -->
  <g transform="translate(40,40)">
    <ellipse cx="100" cy="105" rx="60" ry="40" fill="url(#eagle)" filter="url(#blur)" opacity="0.35"/>

    <path d="
      M100 95
      C 88 88, 68 78, 42 72
      C 30 70, 20 72, 18 78
      C 22 76, 34 80, 48 86
      C 60 91, 74 98, 84 108
      Z
    " fill="url(#eagle)"/>

    <path d="
      M84 108
      C 70 104, 52 100, 32 104
      C 24 106, 18 112, 20 116
      C 26 112, 40 110, 58 112
      C 70 114, 80 118, 88 122
      Z
    " fill="url(#eagle)" opacity="0.85"/>

    <path d="
      M100 95
      C 112 88, 132 78, 158 72
      C 170 70, 180 72, 182 78
      C 178 76, 166 80, 152 86
      C 140 91, 126 98, 116 108
      Z
    " fill="url(#eagle)"/>

    <path d="
      M116 108
      C 130 104, 148 100, 168 104
      C 176 106, 182 112, 180 116
      C 174 112, 160 110, 142 112
      C 130 114, 120 118, 112 122
      Z
    " fill="url(#eagle)" opacity="0.85"/>

    <ellipse cx="100" cy="112" rx="16" ry="20" fill="url(#eagle)"/>

    <circle cx="100" cy="88" r="12" fill="#e8e8f0"/>

    <path d="M108 90 L116 93 L108 96 Z" fill="#f59e0b"/>

    <circle cx="104" cy="87" r="2.5" fill="#1e1b4b"/>
    <circle cx="104" cy="87" r="1" fill="#fff"/>

    <path d="
      M92 128 C 88 138, 82 148, 78 158
      M100 130 C 100 142, 100 152, 100 162
      M108 128 C 112 138, 118 148, 122 158
    " stroke="url(#eagle)" stroke-width="4" stroke-linecap="round"/>

    <rect x="84" y="148" width="32" height="20" rx="2" fill="#a78bfa" opacity="0.25"/>
    <line x1="100" y1="148" x2="100" y2="168" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
    <path d="M84 148 Q92 144 100 148" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M116 148 Q108 144 100 148" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
</svg>
